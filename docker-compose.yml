services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      DATABASE_PATH: /app/backend/data/tasks.db
      ALLOW_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      AGENT_MAX_RETRIES: ${AGENT_MAX_RETRIES:-2}
      MAX_IMAGE_BYTES: ${MAX_IMAGE_BYTES:-10485760}
      MAX_IMAGE_PIXELS: ${MAX_IMAGE_PIXELS:-25000000}
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/backend/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
        VITE_ENABLE_STAGE2: ${VITE_ENABLE_STAGE2:-true}
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
